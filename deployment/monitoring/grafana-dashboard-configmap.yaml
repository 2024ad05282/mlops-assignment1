apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  labels:
    app: grafana
data:
  heart_disease_api_metrics.json: |
    {
      "title": "Heart Disease API Metrics",
      "schemaVersion": 38,
      "version": 1,
      "panels": [
        {
          "type": "graph",
          "title": "Request Count",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "rate(api_request_count_total[1m])",
              "legendFormat": "{{endpoint}} {{http_status}}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "graph",
          "title": "Request Latency",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(api_request_latency_seconds_bucket[1m])) by (le, endpoint))",
              "legendFormat": "{{endpoint}}",
              "refId": "A"
            }
          ]
        }
      ]
    }
